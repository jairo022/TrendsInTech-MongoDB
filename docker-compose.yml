services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bep-backend
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - .env
    ports:
      - "5001:5001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bep-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

  mongo:
    image: mongo:7
    container_name: bep-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
